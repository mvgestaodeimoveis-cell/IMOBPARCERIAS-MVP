name: Rotinas diárias (parceria e exclusividade)

# Roda todo dia: suspende inadimplentes (taxa PIX vencida) e alerta exclusividades
# a vencer em até 15 dias. De graça no GitHub Actions.
#
# Configure em Settings > Secrets and variables > Actions:
#   API_BASE_URL  ex.: https://imobparcerias-api.onrender.com
#   CRON_SECRET   o mesmo valor definido na variável de ambiente da API

on:
  schedule:
    - cron: '30 6 * * *' # todo dia, 06:30 UTC (~03:30 BRT)
  workflow_dispatch: {}

jobs:
  rotinas:
    runs-on: ubuntu-latest
    steps:
      - name: Suspender inadimplentes (taxa vencida)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$API_BASE_URL/api/v1/jobs/pagamentos-vencidos" \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 -w '\nHTTP %{http_code}\n'
      - name: Alerta de vencimento de exclusividade (15 dias)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$API_BASE_URL/api/v1/jobs/exclusividade-vencendo" \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 -w '\nHTTP %{http_code}\n'
      - name: Feedback pós-visita (item 3)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$API_BASE_URL/api/v1/jobs/feedback-visitas" \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 -w '\nHTTP %{http_code}\n'
