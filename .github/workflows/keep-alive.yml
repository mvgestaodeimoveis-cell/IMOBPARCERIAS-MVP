name: Keep-alive (evita cold start do Render)

# O plano free do Render suspende o serviço após ~15 min sem tráfego; o primeiro
# acesso do dia fica lento (a "tela preta" ao entrar). Este ping mantém a API
# acordada durante o horário comercial, batendo no /health a cada 10 minutos.
#
# Configure em Settings > Secrets and variables > Actions:
#   API_BASE_URL  ex.: https://imobparcerias-api.onrender.com
#
# OBS: em repositório PRIVADO isso consome minutos do GitHub Actions. Se preferir
# custo zero e mais confiável, use um pinger externo gratuito apontando para
# {API_BASE_URL}/health (ex.: cron-job.org a cada 5 min, ou UptimeRobot).

on:
  schedule:
    # A cada 10 min, das 10:00 às 23:59 UTC (~07:00–20:59 BRT).
    - cron: '*/10 10-23 * * *'
  workflow_dispatch: {}

# Evita acúmulo de execuções se uma demorar.
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::Secret API_BASE_URL não configurado."
            exit 1
          fi
          # Tenta algumas vezes: o plano free do Render pode estar em cold start ou
          # trocando de container (deploy). Só falha se a API ficar fora após os retries.
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$API_BASE_URL/health" || echo 000)
            echo "tentativa $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API acordada."
              exit 0
            fi
            sleep 20
          done
          echo "::error::/health não respondeu 200 após 6 tentativas (~2 min). API pode estar fora."
          exit 1
