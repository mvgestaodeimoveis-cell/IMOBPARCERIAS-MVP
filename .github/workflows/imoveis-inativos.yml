name: Manutenção de imóveis (diária)

# Fase 3 — fluxo escalonado: 1º aviso (30 dias sem atualização) → 2º aviso (+7 dias)
# → INATIVO (+5 dias). Precisa rodar TODO DIA para respeitar os prazos.
# Roda de graça no GitHub Actions (não depende do plano do Render/Vercel).
#
# Configure em Settings > Secrets and variables > Actions:
#   API_BASE_URL  ex.: https://imobparcerias-api.onrender.com
#   CRON_SECRET   o mesmo valor definido na variável de ambiente da API

on:
  schedule:
    - cron: '0 6 * * *' # todo dia, 06:00 UTC (~03:00 BRT)
  workflow_dispatch: {}

jobs:
  inativar:
    runs-on: ubuntu-latest
    steps:
      - name: Rodar manutenção de imóveis (avisos + inativação)
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$API_BASE_URL/api/v1/jobs/imoveis-inativos" \
            -H "x-cron-secret: $CRON_SECRET" \
            --max-time 120 -w '\nHTTP %{http_code}\n'
